# NetWatch nftables Configuration Example
# This file shows the structure of nftables rules created by NetWatch

#!/usr/sbin/nft -f

# Flush existing netwatch table (clean slate)
flush ruleset

# Create isolated table for NetWatch
table inet netwatch {
    # Input chain - controls incoming traffic
    chain input {
        type filter hook input priority 0; policy accept;
        
        # Rules added by NetWatch will appear here
        # Example: block specific process by mark
        # meta mark 1234 drop comment "block_pid_1234"
    }
    
    # Output chain - controls outgoing traffic  
    chain output {
        type filter hook output priority 0; policy accept;
        
        # Rules added by NetWatch will appear here
        # Example: block process from accessing internet
        # meta mark set 1234 comment "block_1234_firefox" drop
    }
}

# Commands to manage NetWatch rules:

# List all rules with handles:
# nft -a list table inet netwatch

# Delete a specific rule by handle:
# nft delete rule inet netwatch output handle <HANDLE_NUMBER>

# Delete entire table (cleanup):
# nft delete table inet netwatch

# View counters (if enabled):
# nft list table inet netwatch
