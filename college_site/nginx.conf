server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # ЗАМЕНИТЕ на ваш домен

    location = /favicon.ico { access_log off; log_not_found off; }
    
    location /static/ {
        alias /workspace/college_site/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/workspace/college_site/college.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL настройка (раскомментируйте после получения сертификата)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_prefer_server_ciphers on;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirect HTTP to HTTPS (раскомментируйте после настройки SSL)
    # return 301 https://$server_name$request_uri;
}
